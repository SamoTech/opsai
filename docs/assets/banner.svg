<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg-op" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d18"/>
      <stop offset="100%" style="stop-color:#0b1828"/>
    </linearGradient>
    <linearGradient id="accent-op" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <pattern id="grid-op" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e1f30" stroke-width="1"/>
    </pattern>
    <filter id="glow-op">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg-op)"/>
  <rect width="1280" height="320" fill="url(#grid-op)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#accent-op)"/>
