<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040610"/>
      <stop offset="100%" stop-color="#060a14"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0L0 0 0 28" fill="none" stroke="#0a0e1c" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- CI failure analysis mockup (right) -->
  <g opacity="0.22" transform="translate(836,44)">
    <!-- failure event -->
    <rect x="0" y="0" width="380" height="48" rx="8" fill="#0d0a1c" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="18" cy="24" r="8" fill="#ef4444" opacity="0.9"/>
    <text x="34" y="19" font-family="monospace" font-size="12" fill="#fca5a5">GitHub Actions — FAILED</text>
    <text x="34" y="34" font-family="monospace" font-size="11" fill="#6b7280">main · push · ci.yml · 2m 14s</text>
    <text x="34" y="46" font-family="monospace" font-size="10" fill="#4b5563">Run #1042 · payments-service</text>
    <!-- AI analysis card -->
    <rect x="0" y="56" width="380" height="96" rx="8" fill="#080c1c" stroke="#3b82f6" stroke-width="1"/>
    <text x="14" y="74" font-family="monospace" font-size="11" fill="#93c5fd">&#x1F9E0; OpsAI Root Cause Analysis</text>
    <rect x="14" y="80" width="90" height="18" rx="9" fill="#ef4444" opacity="0.2"/>
    <text x="59" y="93" font-family="monospace" font-size="10" fill="#fca5a5" text-anchor="middle">dependency</text>
    <text x="114" y="93" font-family="monospace" font-size="11" fill="#dbeafe">94% confidence</text>
    <text x="14" y="112" font-family="monospace" font-size="11" fill="#e0e7ff">Fix: npm install --legacy-peer-deps</text>
    <rect x="14" y="120" width="350" height="24" rx="4" fill="#0f1428"/>
    <text x="22" y="136" font-family="monospace" font-size="10" fill="#6366f1">$ npm install --legacy-peer-deps</text>
    <!-- PR comment + Slack -->
    <rect x="0" y="160" width="180" height="30" rx="8" fill="#0d1428" stroke="#22c55e" stroke-width="1"/>
    <text x="12" y="179" font-family="monospace" font-size="11" fill="#86efac">&#x2705; PR comment posted</text>
    <rect x="190" y="160" width="190" height="30" rx="8" fill="#0d1428" stroke="#818cf8" stroke-width="1"/>
    <text x="202" y="179" font-family="monospace" font-size="11" fill="#a5b4fc">&#x1F514; Slack alerted</text>
    <!-- reliability score -->
    <rect x="0" y="198" width="380" height="30" rx="8" fill="#0a0e1a"/>
    <text x="12" y="217" font-family="monospace" font-size="11" fill="#6b7280">Reliability Score:</text>
    <rect x="130" y="204" width="180" height="12" rx="6" fill="#1a1a30"/>
    <rect x="130" y="204" width="148" height="12" rx="6" fill="url(#acc2)"/>
    <text x="320" y="217" font-family="monospace" font-size="12" font-weight="700" fill="#22c55e">82/100</text>
  </g>
  <!-- logo: ops bolt + magnifying glass -->
  <g transform="translate(80,84)" filter="url(#glow)">
    <rect x="0" y="0" width="116" height="116" rx="18" fill="#040610" stroke="url(#acc)" stroke-width="3"/>
    <!-- magnifying glass -->
    <circle cx="46" cy="48" r="26" fill="none" stroke="url(#acc)" stroke-width="3"/>
    <line x1="64" y1="66" x2="82" y2="84" stroke="url(#acc)" stroke-width="4" stroke-linecap="round"/>
    <!-- AI bolt inside lens -->
    <path d="M40 38 L33 50 L44 50 L36 62 L52 44 L42 44 Z" fill="url(#acc2)" opacity="0.9"/>
  </g>
  <!-- wordmark -->
  <text x="222" y="95" font-family="'SF Mono',Consolas,monospace" font-size="13" fill="#3b82f6" opacity="0.6" letter-spacing="4">AI-POWERED DEVOPS COPILOT</text>
  <text x="218" y="175" font-family="Arial Black,'Arial Bold',sans-serif" font-size="100" font-weight="900" letter-spacing="-3" fill="#f0f4ff">OpsAI</text>
  <text x="218" y="210" font-family="'SF Mono',Consolas,monospace" font-size="20" fill="url(#acc)" letter-spacing="2">Analyze · Diagnose · Fix</text>
  <rect x="220" y="226" width="500" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- feature pills -->
  <rect x="222" y="242" width="130" height="26" rx="13" fill="#3b82f6" opacity="0.15"/>
  <text x="287" y="260" font-family="monospace" font-size="12" fill="#93c5fd" text-anchor="middle">GitHub Actions</text>
  <rect x="364" y="242" width="110" height="26" rx="13" fill="#6366f1" opacity="0.15"/>
  <text x="419" y="260" font-family="monospace" font-size="12" fill="#a5b4fc" text-anchor="middle">GitLab CI</text>
  <rect x="486" y="242" width="110" height="26" rx="13" fill="#22c55e" opacity="0.15"/>
  <text x="541" y="260" font-family="monospace" font-size="12" fill="#86efac" text-anchor="middle">Auto-fix PR</text>
  <rect x="608" y="242" width="110" height="26" rx="13" fill="#3b82f6" opacity="0.15"/>
  <text x="663" y="260" font-family="monospace" font-size="12" fill="#93c5fd" text-anchor="middle">Slack Alert</text>
  <text x="222" y="296" font-family="monospace" font-size="12" fill="#6b7280">Groq · OpenAI · Anthropic · FastAPI · Next.js 14 · Stripe</text>
</svg>