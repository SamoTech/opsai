<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c10"/>
      <stop offset="100%" stop-color="#0c1520"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e67a00"/>
      <stop offset="100%" stop-color="#fdab43"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#151f2a" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <!-- left accent bar -->
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>
  <!-- decorative pipeline flow (right) -->
  <g opacity="0.18" transform="translate(870,60)">
    <rect x="0"   y="80" width="80" height="36" rx="8" fill="#e67a00"/>
    <rect x="120" y="80" width="80" height="36" rx="8" fill="#fdab43"/>
    <rect x="240" y="80" width="80" height="36" rx="8" fill="#e67a00"/>
    <rect x="360" y="80" width="80" height="36" rx="8" fill="#fdab43"/>
    <line x1="80"  y1="98" x2="120" y2="98" stroke="#fdab43" stroke-width="2"/>
    <line x1="200" y1="98" x2="240" y2="98" stroke="#fdab43" stroke-width="2"/>
    <line x1="320" y1="98" x2="360" y2="98" stroke="#fdab43" stroke-width="2"/>
    <!-- error X -->  
    <line x1="248" y1="88" x2="312" y2="108" stroke="#ff4444" stroke-width="3" opacity="0.7"/>
    <line x1="312" y1="88" x2="248" y2="108" stroke="#ff4444" stroke-width="3" opacity="0.7"/>
    <!-- AI fix spark -->
    <polygon points="290,50 298,70 282,70" fill="#fdab43" opacity="0.8"/>
  </g>
  <!-- logo: gear + brain -->
  <g transform="translate(80,90)" filter="url(#glow)">
    <!-- outer gear ring -->
    <circle cx="60" cy="60" r="54" fill="#0c1520" stroke="url(#acc)" stroke-width="3"/>
    <!-- gear teeth -->
    <rect x="54" y="2"  width="12" height="16" rx="3" fill="url(#acc)"/>
    <rect x="54" y="102" width="12" height="16" rx="3" fill="url(#acc)"/>
    <rect x="2"  y="54" width="16" height="12" rx="3" fill="url(#acc)"/>
    <rect x="102" y="54" width="16" height="12" rx="3" fill="url(#acc)"/>
    <!-- inner circle -->
    <circle cx="60" cy="60" r="30" fill="#e67a00" opacity="0.15"/>
    <!-- AI text -->
    <text x="42" y="68" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="url(#acc)">AI</text>
  </g>
  <!-- wordmark -->
  <text x="220" y="152" font-family="'SF Mono',Consolas,monospace" font-size="76" font-weight="700" letter-spacing="-2" fill="#f0f4f8">Ops</text>
  <text x="388" y="152" font-family="'SF Mono',Consolas,monospace" font-size="76" font-weight="700" letter-spacing="-2" fill="url(#acc)">AI</text>
  <!-- tagline -->
  <text x="222" y="193" font-family="'SF Mono',Consolas,monospace" font-size="19" fill="#fdab43" letter-spacing="3" opacity="0.85">AI-POWERED DEVOPS COPILOT</text>
  <rect x="220" y="210" width="460" height="2" fill="url(#acc)" opacity="0.45"/>
  <!-- chips -->
  <rect x="222" y="228" width="108" height="28" rx="14" fill="#e67a00" opacity="0.18"/>
  <text x="276" y="247" font-family="monospace" font-size="13" fill="#fdab43" text-anchor="middle">CI/CD Analysis</text>
  <rect x="342" y="228" width="110" height="28" rx="14" fill="#e67a00" opacity="0.18"/>
  <text x="397" y="247" font-family="monospace" font-size="13" fill="#fdab43" text-anchor="middle">Auto-Fix PRs</text>
  <rect x="464" y="228" width="120" height="28" rx="14" fill="#e67a00" opacity="0.18"/>
  <text x="524" y="247" font-family="monospace" font-size="13" fill="#fdab43" text-anchor="middle">Multi-LLM · Free</text>
</svg>